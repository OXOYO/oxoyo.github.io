/span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br></pre></td><td class="code"><pre><span class="line">/**</span><br><span class="line"> * Created by OXOYO on 2018/11/9.</span><br><span class="line"> *</span><br><span class="line"> * &#x7981;&#x7528;&#x8C03;&#x8BD5;&#x5DE5;&#x5177;</span><br><span class="line"> */</span><br><span class="line"></span><br><span class="line">const closeWindow = (loop) =&gt; {</span><br><span class="line">  clearInterval(loop)</span><br><span class="line">  // &#x5173;&#x95ED;&#x5F53;&#x524D;&#x7A97;&#x53E3;</span><br><span class="line">  window.close()</span><br><span class="line">  // &#x5C06;&#x5F53;&#x524D;&#x7A97;&#x53E3;&#x8DF3;&#x8F6C;&#x7F6E;&#x7A7A;&#x767D;&#x9875;</span><br><span class="line">  window.location = &apos;about:blank&apos;</span><br><span class="line">  console.clear()</span><br><span class="line">}</span><br><span class="line"></span><br><span class="line">export default {</span><br><span class="line">  init: function () {</span><br><span class="line">    window.onkeydown = window.onkeyup = window.onkeypress = function (event) {</span><br><span class="line">      // &#x5224;&#x65AD;&#x662F;&#x5426;&#x6309;&#x4E0B;F12&#xFF0C;F12&#x952E;&#x7801;&#x4E3A;123</span><br><span class="line">      if (event.keyCode === 123) {</span><br><span class="line">        event.preventDefault()</span><br><span class="line">        window.event.returnValue = false</span><br><span class="line">      }</span><br><span class="line">    }</span><br><span class="line">    // &#x4E3A;&#x53F3;&#x952E;&#x6DFB;&#x52A0;&#x81EA;&#x5B9A;&#x4E49;&#x4E8B;&#x4EF6;</span><br><span class="line">    window.oncontextmenu = function (event) {</span><br><span class="line">      event.preventDefault()</span><br><span class="line">      return false</span><br><span class="line">    }</span><br><span class="line">    // &#x6253;&#x5F00;&#x63A7;&#x5236;&#x53F0;&#x7684;&#x5BBD;&#x6216;&#x9AD8;&#x9608;&#x503C;</span><br><span class="line">    let threshold = 160</span><br><span class="line">    let div = document.createElement(&apos;div&apos;)</span><br><span class="line">    Object.defineProperty(div, &apos;id&apos;, {</span><br><span class="line">      get: () =&gt; {</span><br><span class="line">        closeWindow(loop)</span><br><span class="line">      }</span><br><span class="line">    })</span><br><span class="line">    // &#x5FAA;&#x73AF;&#x68C0;&#x6D4B;</span><br><span class="line">    let loop = setInterval(function () {</span><br><span class="line">      let startTime = performance.now()</span><br><span class="line">      if (</span><br><span class="line">        // &#x65B9;&#x5F0F;&#x4E00;&#xFF1A;&#x68C0;&#x6D4B;console&#x76F8;&#x5173;&#x5BF9;&#x8C61;</span><br><span class="line">        (window.console &amp;&amp; (console.firebug || console.table &amp;&amp; /firebug/i.test(console.table()))) ||</span><br><span class="line">        (typeof opera === &apos;object&apos; &amp;&amp; typeof opera.postError === &apos;function&apos; &amp;&amp; console.profile.length &gt; 0) ||</span><br><span class="line">        (typeof console.profiles === &apos;object&apos; &amp;&amp; console.profiles.length &gt; 0) ||</span><br><span class="line">        // &#x65B9;&#x5F0F;&#x4E8C;&#xFF1A;&#x68C0;&#x6D4B;&#x7A97;&#x53E3;&#x5BBD;&#x9AD8;</span><br><span class="line">        (window.outerWidth - window.innerWidth &gt; threshold) ||</span><br><span class="line">        (window.outerHeight - window.innerHeight &gt; threshold)</span><br><span class="line">      ) {</span><br><span class="line">        closeWindow(loop)</span><br><span class="line">      }</span><br><span class="line">      // &#x65B9;&#x5F0F;&#x4E09;&#xFF1A;&#x590D;&#x5199;div.id&#x7684;getter&#x65B9;&#x6CD5;&#xFF0C;&#x63A7;&#x5236;&#x53F0;&#x6253;&#x5F00;&#x65F6;&#x6253;&#x5370;div&#x4F1A;&#x8C03;&#x7528;&#x5176;div.id&#x7684;get&#x65B9;&#x6CD5;</span><br><span class="line">      console.log(div)</span><br><span class="line">      console.clear()</span><br><span class="line">      // &#x65B9;&#x5F0F;&#x56DB;&#xFF1A;&#x590D;&#x5199;toString&#x65B9;&#x6CD5;&#xFF0C;&#x63A7;&#x5236;&#x53F0;&#x6253;&#x5F00;&#x65F6;&#x6253;&#x5370;devtools&#x4F1A;&#x8C03;&#x7528;&#x5176;toString&#x65B9;&#x6CD5;</span><br><span class="line">      let devtools = /./</span><br><span class="line">      devtools.toString = function () {</span><br><span class="line">        this.opened = true</span><br><span class="line">        closeWindow(loop)</span><br><span class="line">      }</span><br><span class="line">      console.log(&apos;%c&apos;, devtools)</span><br><span class="line">      console.clear()</span><br><span class="line">      // &#x65B9;&#x5F0F;&#x4E94;&#xFF1A;&#x68C0;&#x6D4B;&#x4EE3;&#x7801;&#x8017;&#x65F6;&#xFF0C;devtool&#x4E0B;&#x4EE3;&#x7801;&#x8FD0;&#x884C;&#x901F;&#x5EA6;&#x964D;&#x4F4E;</span><br><span class="line">      for (let i = 0; i &lt; 1000; i++) {</span><br><span class="line">        console.log(i)</span><br><span class="line">        console.clear()</span><br><span class="line">      }</span><br><span class="line">      let diff = performance.now() - startTime</span><br><span class="line">      if (diff &gt; 200) {</span><br><span class="line">        closeWindow(loop)</span><br><span class="line">      }</span><br><span class="line">    }, 1000)</span><br><span class="line">  }</span><br><span class="line">}</span><br></pre></td></tr></table></figure>
